[project]
name = "analyst-arena"
version = "0.1.0"
description = "HUD environment for model-vs-model financial analyst debate (Analyst Arena)"
requires-python = ">=3.11"
dependencies = [
    "hud-python>=0.1.0",
]

[project.optional-dependencies]
dev = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["analyst_arena"]
